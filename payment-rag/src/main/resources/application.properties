spring.application.name=payment-rag
server.port=8090

spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o

spring.ai.vectorstore.chroma.client.host=${CHROMA_HOST:http://localhost}
spring.ai.vectorstore.chroma.client.port=${CHROMA_PORT:8000}
spring.ai.vectorstore.chroma.collection-name=PaymentKnowledge
spring.ai.vectorstore.chroma.initialize-schema=true
spring.ai.vectorstore.chroma.index-type=HNSW
spring.ai.vectorstore.chroma.distance-function=COSINE

spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_rag}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

rag.bootstrap.enabled=${RAG_BOOTSTRAP:true}
rag.bootstrap.document-name=payment-policy

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
