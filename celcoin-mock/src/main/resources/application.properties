spring.application.name=celcoin-mock
server.port=8082

# Shared postgres-banking DB, separate schema prefix (celcoin_*)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5434}/${DB_NAME:payment_banking}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Mock behaviour
# Delay in ms before account status moves from PROCESSING to CONFIRMED
celcoin.mock.onboarding-delay-ms=${ONBOARDING_DELAY_MS:3000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
