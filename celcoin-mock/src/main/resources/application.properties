spring.application.name=celcoin-mock
server.port=8082

# Dedicated postgres-celcoin DB — isolated from payment-banking
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5436}/${DB_NAME:celcoin_mock}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Mock behaviour
# Delay in ms before account status moves from PROCESSING to CONFIRMED
celcoin.mock.onboarding-delay-ms=${ONBOARDING_DELAY_MS:3000}

# URL to deliver PIX webhook callbacks (banking-service)
banking.webhook.url=${BANKING_WEBHOOK_URL:http://localhost:8081/api/webhooks/celcoin/pix}
# Delay in ms before firing the PIX webhook after accepting a transfer
celcoin.mock.pix-webhook-delay-ms=${PIX_WEBHOOK_DELAY_MS:3000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
