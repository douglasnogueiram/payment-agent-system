services:

  # ─────────────── Databases ───────────────────────────────────────────────
  postgres-agent:
    image: postgres:16-alpine
    container_name: payment-postgres-agent
    environment:
      POSTGRES_DB: payment_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres-agent-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-banking:
    image: postgres:16-alpine
    container_name: payment-postgres-banking
    environment:
      POSTGRES_DB: payment_banking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5434:5432"
    volumes:
      - postgres-banking-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-rag:
    image: postgres:16-alpine
    container_name: payment-postgres-rag
    environment:
      POSTGRES_DB: payment_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5435:5432"
    volumes:
      - postgres-rag-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────── ChromaDB ────────────────────────────────────────────────
  chromadb:
    image: ghcr.io/chroma-core/chroma:1.0.0
    container_name: payment-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      ALLOW_RESET: "true"
      ANONYMIZED_TELEMETRY: "false"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000' 2>/dev/null && echo ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─────────────── Keycloak ────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: payment-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-mem
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import

  # ─────────────── pgAdmin ─────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: payment-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@payment.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - ./keycloak/../pgadmin/servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres-agent
      - postgres-banking
      - postgres-rag

  # ─────────────── Backend: Payment Agent ──────────────────────────────────
  payment-agent:
    build:
      context: ./payment-agent
      dockerfile: Dockerfile
    container_name: payment-agent
    ports:
      - "8080:8080"
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DB_HOST: postgres-agent
      DB_PORT: 5432
      DB_NAME: payment_agent
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CHROMA_HOST: http://chromadb
      CHROMA_PORT: 8000
      BANKING_SERVICE_URL: http://payment-banking-service:8081
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: payment
    depends_on:
      postgres-agent:
        condition: service_healthy
      chroma-init:
        condition: service_completed_successfully
      payment-banking-service:
        condition: service_started

  # ─────────────── Celcoin Mock ─────────────────────────────────────────────
  celcoin-mock:
    build:
      context: ./celcoin-mock
      dockerfile: Dockerfile
    container_name: celcoin-mock
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres-banking
      DB_PORT: 5432
      DB_NAME: payment_banking
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      ONBOARDING_DELAY_MS: 3000
    depends_on:
      postgres-banking:
        condition: service_healthy

  # ─────────────── Backend: Banking Service ────────────────────────────────
  payment-banking-service:
    build:
      context: ./payment-banking-service
      dockerfile: Dockerfile
    container_name: payment-banking-service
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres-banking
      DB_PORT: 5432
      DB_NAME: payment_banking
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CELCOIN_BASE_URL: http://celcoin-mock:8082
      CELCOIN_CLIENT_ID: mock-client
      CELCOIN_CLIENT_SECRET: mock-secret
    depends_on:
      postgres-banking:
        condition: service_healthy
      celcoin-mock:
        condition: service_started

  # ─────────────── ChromaDB Init ───────────────────────────────────────────
  # Creates the PaymentKnowledge collection before the apps start.
  # Workaround for Spring AI 1.1.0-SNAPSHOT not auto-creating via initialize-schema=true.
  chroma-init:
    image: curlimages/curl:8.6.0
    entrypoint: ["sh", "-c", "until curl -sf http://chromadb:8000/api/v1/heartbeat; do echo waiting; sleep 2; done && curl -sf -X POST http://chromadb:8000/api/v1/collections -H 'Content-Type: application/json' -d '{\"name\":\"PaymentKnowledge\",\"metadata\":{\"hnsw:space\":\"cosine\"}}' && echo done || echo exists"]
    depends_on:
      chromadb:
        condition: service_healthy

  # ─────────────── Backend: RAG Loader ─────────────────────────────────────
  payment-rag:
    build:
      context: ./payment-rag
      dockerfile: Dockerfile
    container_name: payment-rag
    ports:
      - "8090:8090"
    restart: unless-stopped
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DB_HOST: postgres-rag
      DB_PORT: 5432
      DB_NAME: payment_rag
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      CHROMA_HOST: http://chromadb
      CHROMA_PORT: 8000
    depends_on:
      postgres-rag:
        condition: service_healthy
      chroma-init:
        condition: service_completed_successfully

  # ─────────────── Frontend ─────────────────────────────────────────────────
  payment-frontend:
    build:
      context: ./payment-frontend
      dockerfile: Dockerfile
    container_name: payment-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - payment-agent
      - payment-rag

volumes:
  postgres-agent-data:
  postgres-banking-data:
  postgres-rag-data:
  chroma-data:
