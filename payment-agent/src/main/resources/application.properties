spring.application.name=payment-agent
server.port=8080

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.audio.speech.options.model=gpt-4o-mini-tts-2025-03-20

# ChromaDB (RAG)
spring.ai.vectorstore.chroma.client.host=${CHROMA_HOST:http://localhost}
spring.ai.vectorstore.chroma.client.port=${CHROMA_PORT:8000}
spring.ai.vectorstore.chroma.collection-name=PaymentKnowledge
spring.ai.vectorstore.chroma.initialize-schema=true
spring.ai.vectorstore.chroma.index-type=HNSW
spring.ai.vectorstore.chroma.distance-function=COSINE

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:payment_agent}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak / OAuth2 Resource Server
# Only jwk-set-uri — Spring validates JWT signature without checking the issuer claim.
# This allows tokens issued from any hostname (localhost, LAN IP, etc.) to be accepted.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:payment}/protocol/openid-connect/certs

# Banking service base URL (called by PaymentTools)
banking.service.url=${BANKING_SERVICE_URL:http://localhost:8081}

# CORS (frontend)
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
