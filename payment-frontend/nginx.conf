server {
    listen 80;

    # Docker DNS — re-resolves upstreams dynamically to survive container restarts
    resolver 127.0.0.11 valid=5s;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to payment-agent backend
    location /api/ {
        set $upstream_agent "payment-agent:8080";
        proxy_pass http://$upstream_agent$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE — disable buffering so tokens stream through immediately
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Proxy RAG loader calls
    location /rag/ {
        set $upstream_rag "payment-rag:8090";
        rewrite ^/rag/(.*)$ /api/$1 break;
        proxy_pass http://$upstream_rag;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # SPA fallback routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
