server {
    listen 80;
    return 301 https://$host:3443$request_uri;
}

server {
    listen 443 ssl;

    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=5s;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        set $upstream_agent "payment-agent:8080";
        proxy_pass http://$upstream_agent$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    location /banking/ {
        set $upstream_banking "payment-banking-service:8081";
        rewrite ^/banking/(.*)$ /$1 break;
        proxy_pass http://$upstream_banking;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /rag/ {
        set $upstream_rag "payment-rag:8090";
        rewrite ^/rag/(.*)$ /api/$1 break;
        proxy_pass http://$upstream_rag;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Proxy Keycloak token endpoint — avoids mixed-content blocks on HTTPS pages
    location = /kc/token {
        set $upstream_kc "keycloak:8080";
        proxy_pass http://$upstream_kc/realms/payment/protocol/openid-connect/token;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
