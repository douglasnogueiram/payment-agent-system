# Rate limiting zones (defined in http context)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=kc:5m rate=5r/s;

server {
    listen 80;
    server_name meuagentepix.com.br www.meuagentepix.com.br;
    return 301 https://meuagentepix.com.br$request_uri;
}

server {
    listen 443 ssl;
    server_name meuagentepix.com.br;

    ssl_certificate     /etc/letsencrypt/live/meuagentepix.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/meuagentepix.com.br/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    resolver 127.0.0.11 valid=5s;

    # ── Security headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security 'max-age=63072000; includeSubDomains; preload' always;
    add_header X-Frame-Options 'SAMEORIGIN' always;
    add_header X-Content-Type-Options 'nosniff' always;
    add_header Referrer-Policy 'strict-origin-when-cross-origin' always;
    add_header Permissions-Policy 'microphone=(self), camera=()' always;

    root /usr/share/nginx/html;
    index index.html;

    # Payment Agent (AI chat, STT, statements)
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $upstream_agent "payment-agent:8080";
        proxy_pass http://$upstream_agent$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Banking Service
    location /banking/ {
        set $upstream_banking "payment-banking-service:8081";
        rewrite ^/banking/(.*)$ /$1 break;
        proxy_pass http://$upstream_banking;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # RAG Service
    location /rag/ {
        set $upstream_rag "payment-rag:8090";
        rewrite ^/rag/(.*)$ /api/$1 break;
        proxy_pass http://$upstream_rag;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
        client_max_body_size 10m;
    }

    # Keycloak — full proxy so no extra port needs to be public
    # KC_HTTP_RELATIVE_PATH=/kc so all Keycloak paths start with /kc/
    # Use $request_uri to preserve full path when proxy_pass uses a variable
    # WebSocket map for Keycloak admin console
    # (defined inline via variable — nginx evaluates per-request)

    location /kc/ {
        set $upstream_kc "keycloak:8080";
        proxy_pass http://$upstream_kc$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Port 443;
        # Pass WebSocket upgrade only when client requests it; otherwise keep-alive
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 3600s;
        # Disable gzip passthrough — can corrupt streaming/SSE responses
        proxy_set_header Accept-Encoding "";
        # Let Keycloak manage its own security headers — avoid duplicates
        proxy_hide_header X-Frame-Options;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Strict-Transport-Security;
        # Larger buffers for Keycloak HTML pages
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
